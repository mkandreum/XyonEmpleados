services:
  db-credentials-init:
    image: alpine:3.20
    restart: "no"
    command:
      - sh
      - -c
      - |
        set -eu
        mkdir -p /db-auth
        if [ ! -s /db-auth/postgres_password ]; then
          head -c 48 /dev/urandom | base64 | tr -d '\n' > /db-auth/postgres_password
          chmod 600 /db-auth/postgres_password
          echo "[db-credentials-init] postgres_password generated"
        else
          echo "[db-credentials-init] postgres_password already exists"
        fi
    volumes:
      - db_auth:/db-auth

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-xyonempleados_db}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@xyonempleados.com}
      - ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD:-}
      - FRONTEND_URL=${FRONTEND_URL:-}
    volumes:
      - uploads:/app/uploads
      - db_auth:/run/secrets-db:ro
    command:
      - sh
      - -c
      - |
        set -eu
        # Validate required secrets at runtime (not at build time)
        if [ -z "$JWT_SECRET" ]; then echo "[ERROR] JWT_SECRET env var is required"; exit 1; fi
        if [ -z "$ADMIN_INITIAL_PASSWORD" ]; then echo "[ERROR] ADMIN_INITIAL_PASSWORD env var is required"; exit 1; fi
        DB_PASS="$(cat /run/secrets-db/postgres_password)"
        export DATABASE_URL="postgresql://${POSTGRES_USER}:${DB_PASS}@db:5432/${POSTGRES_DB}"
        echo "[app] waiting for database auth + migrations..."
        until npm run prisma:migrate; do
          echo "[app] prisma:migrate failed, retrying in 5s..."
          sleep 5
        done
        exec node src/server.js
    depends_on:
      db-credentials-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets-db/postgres_password
      POSTGRES_DB: ${POSTGRES_DB:-xyonempleados_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - db_auth:/run/secrets-db
    depends_on:
      db-credentials-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  uploads:
  db_auth:
